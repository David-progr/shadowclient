name: Build Shadow + Light Client

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build both JARs
        run: ./gradlew build lightJar

      - name: List and rename outputs
        run: |
          ls -lh build/libs/
          # Loom remaps to a name based on gradle.properties archives_base_name.
          # Normalise to predictable names so the upload steps always find them.
          find build/libs -name '*.jar' ! -name '*-sources.jar' ! -name 'light-client-*' -exec cp {} build/libs/shadow-client-2.0.0.jar \; || true

      - name: Upload Shadow Client JAR
        uses: actions/upload-artifact@v4
        with:
          name: shadow-client-jar
          path: build/libs/shadow-client-2.0.0.jar
          if-no-files-found: error

      - name: Upload Light Client JAR
        uses: actions/upload-artifact@v4
        with:
          name: light-client-jar
          path: build/libs/light-client-*.jar
          if-no-files-found: error
